name: "Publish Release"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest' 
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: setup node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ 
          releaseName: "TieZ v__VERSION__"
          releaseBody: "Windows NSIS installer and portable ZIP."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: build portable bundle
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        run: npm run build:portable

      - name: upload portable bundle
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $portable = 'artifacts/portable/tiez-portable.zip'
          $assetName = "TieZ_${version}_x64_portable.zip"
          gh release upload "v$version" "$portable#$assetName" --repo $env:GITHUB_REPOSITORY --clobber
